<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Surebet - Best Bets</title>
    <style>
        :root {
            --bg-color: #0b1416;
            --card-bg: #112225;
            --accent-gold: #c5a035;
            --text-color: #ffffff;
            --text-muted: #8da4a7;
            --green-profit: #00ff88;
            --red-loss: #ff4d4d;
            --input-bg: #ffffff;
            --input-text: #112225;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background-color: var(--card-bg);
            border: 2px solid var(--accent-gold);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header img {
            max-width: 220px;
            height: auto;
        }

        .grid-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 25px;
        }

        @media (max-width: 600px) {
            .grid-inputs {
                grid-template-columns: 1fr;
            }
        }

        .bet-column {
            background: rgba(0, 0, 0, 0.25);
            padding: 20px;
            border-radius: 8px;
            border-top: 4px solid var(--accent-gold);
        }

        .input-group {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .input-group label {
            font-weight: 600;
            color: var(--text-muted);
            font-size: 14px;
        }

        .input-group input[type="number"] {
            width: 65%;
            padding: 8px 12px;
            border-radius: 6px;
            border: none;
            background-color: var(--input-bg);
            color: var(--input-text);
            font-size: 16px;
            font-weight: bold;
            text-align: right;
        }

        .input-group input:focus {
            outline: 2px solid var(--accent-gold);
        }

        .result-box {
            background-color: rgba(0, 0, 0, 0.4);
            padding: 10px 12px;
            border-radius: 6px;
            width: 65%;
            text-align: right;
            font-weight: bold;
            font-size: 16px;
            min-height: 38px;
        }

        .global-controls {
            background: rgba(197, 160, 53, 0.05);
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            border: 1px solid rgba(197, 160, 53, 0.2);
        }

        .footer-results {
            margin-top: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 20px;
            border-top: 2px solid rgba(197, 160, 53, 0.3);
            font-size: 20px;
            font-weight: bold;
        }

        .res-val {
            color: var(--green-profit);
        }
        .res-loss {
            color: var(--red-loss);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <img src="https://i.postimg.cc/pTRm7MvP/Logo.png" alt="Best Bets Logo">
        </div>

        <div class="grid-inputs">
            <div class="bet-column">
                <h3 style="color: var(--accent-gold); margin-bottom: 15px; text-align: center;">Aposta 1</h3>
                <div class="input-group">
                    <label>Odd:</label>
                    <input type="number" id="odd1" placeholder="Ex: 3.30" step="0.001" min="0">
                </div>
                <div class="input-group">
                    <label>Apostar:</label>
                    <input type="number" id="stake1" placeholder="0.00" step="0.01">
                </div>
                <div class="input-group">
                    <label>Retorno:</label>
                    <div class="result-box" id="return1">0.00</div>
                </div>
                <div class="input-group">
                    <label>Lucro Líq.:</label>
                    <div class="result-box" id="profit1">0.00</div>
                </div>
            </div>

            <div class="bet-column">
                <h3 style="color: var(--accent-gold); margin-bottom: 15px; text-align: center;">Aposta 2</h3>
                <div class="input-group">
                    <label>Odd:</label>
                    <input type="number" id="odd2" placeholder="Ex: 1.667" step="0.001" min="0">
                </div>
                <div class="input-group">
                    <label>Apostar:</label>
                    <input type="number" id="stake2" placeholder="0.00" step="0.01">
                </div>
                <div class="input-group">
                    <label>Retorno:</label>
                    <div class="result-box" id="return2">0.00</div>
                </div>
                <div class="input-group">
                    <label>Lucro Líq.:</label>
                    <div class="result-box" id="profit2">0.00</div>
                </div>
            </div>
        </div>

        <div class="global-controls">
            <div class="input-group">
                <label>Arredondar para:</label>
                <input type="number" id="roundTo" value="1" step="0.01" min="0.01" style="width: 40%;">
            </div>
            <div class="input-group" style="margin-bottom: 0;">
                <label>Investimento Total:</label>
                <input type="number" id="totalInvestment" placeholder="0.00" step="0.01" style="width: 40%;">
            </div>
        </div>

        <div class="footer-results">
            <div>RESULTADO: <span id="finalReturn" class="res-val">R$ 0.00</span></div>
            <div>LUCRO: <span id="finalProfitPercent" class="res-val">0.00%</span></div>
        </div>
    </div>

    <script>
        const odd1Input = document.getElementById('odd1');
        const stake1Input = document.getElementById('stake1');
        const return1Div = document.getElementById('return1');
        const profit1Div = document.getElementById('profit1');

        const odd2Input = document.getElementById('odd2');
        const stake2Input = document.getElementById('stake2');
        const return2Div = document.getElementById('return2');
        const profit2Div = document.getElementById('profit2');

        const roundToInput = document.getElementById('roundTo');
        const totalInvestmentInput = document.getElementById('totalInvestment');
        
        const finalReturnSpan = document.getElementById('finalReturn');
        const finalProfitPercentSpan = document.getElementById('finalProfitPercent');

        let isRecalculating = false;
        let lastTrigger = 'total';

        function init() {
            odd1Input.addEventListener('input', () => recalculate('total', false));
            odd2Input.addEventListener('input', () => recalculate('total', false));
            totalInvestmentInput.addEventListener('input', () => recalculate('total', false));
            stake1Input.addEventListener('input', () => recalculate('stake1', false));
            stake2Input.addEventListener('input', () => recalculate('stake2', false));
            roundToInput.addEventListener('input', () => recalculate(lastTrigger, true));

            totalInvestmentInput.addEventListener('blur', () => recalculate('total', true));
            stake1Input.addEventListener('blur', () => recalculate('stake1', true));
            stake2Input.addEventListener('blur', () => recalculate('stake2', true));
        }

        function setElementStyle(element, value) {
            if (value < 0) {
                element.style.color = 'var(--red-loss)';
            } else if (value > 0) {
                element.style.color = 'var(--green-profit)';
            } else {
                element.style.color = 'var(--text-color)';
            }
        }

        function recalculate(trigger, forceFormatAndRound) {
            if (isRecalculating) return;
            isRecalculating = true;

            if (trigger !== 'roundTo') {
                lastTrigger = trigger;
            }

            let o1 = parseFloat(odd1Input.value) || 0;
            let o2 = parseFloat(odd2Input.value) || 0;
            let roundTo = parseFloat(roundToInput.value) || 0.01;
            if (roundTo <= 0) roundTo = 0.01;

            if (o1 <= 0 || o2 <= 0) {
                return1Div.innerText = "0.00";
                profit1Div.innerText = "0.00";
                return2Div.innerText = "0.00";
                profit2Div.innerText = "0.00";
                finalReturnSpan.innerText = "R$ 0.00";
                finalProfitPercentSpan.innerText = "0.00%";
                finalReturnSpan.className = "res-val";
                finalProfitPercentSpan.className = "res-val";
                isRecalculating = false;
                return;
            }

            let s1 = parseFloat(stake1Input.value) || 0;
            let s2 = parseFloat(stake2Input.value) || 0;
            let totalInvest = parseFloat(totalInvestmentInput.value) || 0;

            let inv1 = 1 / o1;
            let inv2 = 1 / o2;
            let totalImplied = inv1 + inv2;

            if (trigger === 'total') {
                if (totalInvest > 0) {
                    let rawS1 = (totalInvest * inv1) / totalImplied;
                    s1 = Math.round(rawS1 / roundTo) * roundTo;
                    let rawS2 = (totalInvest * inv2) / totalImplied;
                    s2 = Math.round(rawS2 / roundTo) * roundTo;
                    
                    if (forceFormatAndRound) {
                        stake1Input.value = s1 > 0 ? s1.toFixed(2) : "";
                        stake2Input.value = s2 > 0 ? s2.toFixed(2) : "";
                    }
                } else {
                    s1 = 0; s2 = 0;
                    if (forceFormatAndRound) {
                        stake1Input.value = "";
                        stake2Input.value = "";
                    }
                }
            } else if (trigger === 'stake1') {
                if (s1 > 0) {
                    let expectedReturn = s1 * o1;
                    let rawS2 = expectedReturn / o2;
                    s2 = Math.round(rawS2 / roundTo) * roundTo;
                    if (forceFormatAndRound) {
                        stake1Input.value = s1.toFixed(2);
                        stake2Input.value = s2 > 0 ? s2.toFixed(2) : "";
                    }
                } else {
                    s2 = 0;
                    if (forceFormatAndRound) stake2Input.value = "";
                }
            } else if (trigger === 'stake2') {
                if (s2 > 0) {
                    let expectedReturn = s2 * o2;
                    let rawS1 = expectedReturn / o1;
                    s1 = Math.round(rawS1 / roundTo) * roundTo;
                    if (forceFormatAndRound) {
                        stake2Input.value = s2.toFixed(2);
                        stake1Input.value = s1 > 0 ? s1.toFixed(2) : "";
                    }
                } else {
                    s1 = 0;
                    if (forceFormatAndRound) stake1Input.value = "";
                }
            }

            let actualTotalInvest = s1 + s2;
            if (forceFormatAndRound) {
                if (actualTotalInvest > 0) {
                    totalInvestmentInput.value = actualTotalInvest.toFixed(2);
                } else {
                    totalInvestmentInput.value = "";
                }
            }

            let ret1 = s1 * o1;
            let ret2 = s2 * o2;

            return1Div.innerText = ret1.toFixed(2);
            return2Div.innerText = ret2.toFixed(2);

            let p1 = ret1 - actualTotalInvest;
            let p2 = ret2 - actualTotalInvest;

            profit1Div.innerText = p1.toFixed(2);
            profit2Div.innerText = p2.toFixed(2);
            setElementStyle(profit1Div, p1);
            setElementStyle(profit2Div, p2);

            let worstCaseReturn = Math.min(ret1, ret2);
            
            // Alinhamento exato com a métrica de lucro ideal do Telegram
            let profitPercentTheoretical = ((1 / totalImplied) - 1) * 100;

            finalReturnSpan.innerText = "R$ " + worstCaseReturn.toFixed(2);
            finalProfitPercentSpan.innerText = profitPercentTheoretical.toFixed(2) + "%";

            if (profitPercentTheoretical < 0) {
                finalReturnSpan.className = "res-loss";
                finalProfitPercentSpan.className = "res-loss";
            } else {
                finalReturnSpan.className = "res-val";
                finalProfitPercentSpan.className = "res-val";
            }

            isRecalculating = false;
        }

        init();
    </script>
</body>
</html>
