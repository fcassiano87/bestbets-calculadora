<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora BestBets</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#121212;
    color:#fff;
    margin:0;
    padding:20px;
}

.container{
    max-width:500px;
    margin:auto;
    background:#1e1e1e;
    padding:25px;
    border-radius:15px;
}

h1{
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    margin-bottom:15px;
    border:none;
    border-radius:8px;
    font-size:16px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

.result{
    margin-top:20px;
    padding:15px;
    background:#292929;
    border-radius:10px;
}
</style>

</head>

<body>

<div class="container">

<h1>🧮 Calculadora BestBets</h1>

<label>Odd 1</label> <input type="number" step="0.01" id="odd1">

<label>Odd 2</label> <input type="number" step="0.01" id="odd2">

<label>Valor Total (R$)</label> <input type="number" step="0.01" id="stake">

<button onclick="calcular()">Calcular</button>

<div class="result" id="resultado"></div>

</div>

<script>

function calcular(){

let odd1 = parseFloat(document.getElementById("odd1").value);
let odd2 = parseFloat(document.getElementById("odd2").value);
let stake = parseFloat(document.getElementById("stake").value);

if(!odd1 || !odd2 || !stake){
    return;
}

let inv = (1/odd1)+(1/odd2);

let lucroPercent = ((1/inv)-1)*100;

let aposta1 = stake*((1/odd1)/inv);
let aposta2 = stake*((1/odd2)/inv);

let retorno = aposta1*odd1;
let lucro = retorno-stake;

document.getElementById("resultado").innerHTML=
`
<b>Apostar na Odd 1:</b> R$ ${aposta1.toFixed(2)}<br><br>

<b>Apostar na Odd 2:</b> R$ ${aposta2.toFixed(2)}<br><br>

<b>Retorno Garantido:</b> R$ ${retorno.toFixed(2)}<br><br>

<b>Lucro:</b> R$ ${lucro.toFixed(2)}<br><br>

<b>Lucro %:</b> ${lucroPercent.toFixed(2)}%
`;

}

</script>

</body>
</html>
